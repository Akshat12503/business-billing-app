<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid p-3">

    <div class="row">

        <!-- Left Side -->
        <div class="col-lg-4">

            <!-- Customer Details -->
            <div class="card mb-3">
                <div class="card-header">
                    Customer Details
                </div>

                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label">Customer Name</label>
                        <input
                            type="text"
                            id="customerName"
                            class="form-control"
                            placeholder="Enter customer name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Seller Type</label>

                        <select id="sellerType" class="form-select">
                            <option value="local">Local</option>
                            <option value="general">General</option>
                            <option value="retail">Retail</option>
                        </select>
                    </div>

                </div>
            </div>


            <!-- Product Entry -->
            <div class="card mb-3">

                <div class="card-header">
                    Add Product
                </div>

                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="categorySelect" class="form-select">
                            <option>Select Category</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Product</label>
                        <select id="productSelect" class="form-select">
                            <option>Select Product</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity / Weight</label>

                        <input
                            type="number"
                            step="0.001"
                            id="quantity"
                            class="form-control"
                            placeholder="0.000">
                    </div>

                    <button
                        class="btn btn-primary w-100"
                        id="addItemBtn">
                        Add Item
                    </button>

                </div>

            </div>


            <!-- Management -->
            <div class="card">

                <div class="card-header">
                    Management
                </div>

                <div class="card-body d-grid gap-2">

                    <button class="btn btn-success" id="manageProductsBtn">
                        Manage Products
                    </button>

                    <button class="btn btn-secondary" id="exportBtn">
                        Export Data
                    </button>

                    <button class="btn btn-warning" id="importBtn">
                        Import Data
                    </button>

                </div>

            </div>

        </div>


        <!-- Right Side -->
        <div class="col-lg-8">

            <div class="card">

                <div class="card-header">
                    Bill
                </div>

                <div class="card-body">

                    <table class="table table-bordered text-center">

                        <thead>

                        <tr>
                            <th>S.No</th>
                            <th>Item</th>
                            <th>Qty/Weight</th>
                            <th>Rate</th>
                            <th>Total</th>
                            <th>Remove</th>
                        </tr>

                        </thead>

                        <tbody id="billTableBody">

                        </tbody>

                    </table>

                    <h3 class="text-end">
                        Grand Total:
                        ₹ <span id="grandTotal">0.00</span>
                    </h3>

                    <hr>

                    <div class="d-flex flex-wrap gap-2">

                        <button class="btn btn-success" id="saveBillBtn">
                            Save Bill
                        </button>

                        <button class="btn btn-primary" id="pdfBtn">
                            Generate PDF
                        </button>

                        <button class="btn btn-dark" id="printBtn">
                            Print
                        </button>

                        <button class="btn btn-success" id="whatsappBtn">
                            WhatsApp
                        </button>

                        <button class="btn btn-danger" id="clearBillBtn">
                            Clear Bill
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<script src="js/storage.js"></script>
<script src="js/products.js"></script>
<script src="js/billing.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>

</body>
</html>
